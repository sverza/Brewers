<style>
.container {
  background: white;
  border-radius: 12px;
  padding: 40px;
  box-shadow: 0 20px 60px rgba(0,0,0,.3);
  max-width: 800px;
  width: 100%;
}

.court-container {
  background: #d2691e;
  border-radius: 8px;
  padding: 20px;
}

svg {
  display:block;
  width:100%;
  height:700px;
}

.court-line {
  fill:none;
  stroke:white;
  stroke-width:2;
}
</style>

<div class="container">
  <div class="court-container">
    <svg id="court" viewBox="0 0 500 940"></svg>
  </div>
</div>

<script>
const svg = d3.select("#court");

const court = svg.append("g");

court.append("rect")
  .attr("x",22)
  .attr("y",22)
  .attr("width",456)
  .attr("height",896)
  .attr("class","court-line");

court.append("circle")
  .attr("cx",250)
  .attr("cy",470)
  .attr("r",60)
  .attr("class","court-line");

court.append("line")
  .attr("x1",22)
  .attr("y1",470)
  .attr("x2",478)
  .attr("y2",470)
  .attr("class","court-line");
</script>
