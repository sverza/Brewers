<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Bundled Page</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #0a0e0f;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      }

      #__bundler_loading {
        position: fixed;
        bottom: 20px;
        right: 20px;
        font: 13px/1.4 -apple-system, BlinkMacSystemFont, sans-serif;
        color: #666;
        background: #fff;
        padding: 8px 14px;
        border-radius: 8px;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.12);
        z-index: 10000;
      }

      #__bundler_thumbnail {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0e0f;
        z-index: 9999;
      }

      #__bundler_thumbnail svg {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      #__bundler_placeholder {
        color: #999;
        font-size: 14px;
      }
    </style>
    <noscript>
      <style>
        #__bundler_loading {
          display: none;
        }
      </style>

      document.addEventListener('DOMContentLoaded', async function() {
            const loading = document.getElementById('__bundler_loading');

            function setStatus(msg) {
              if (loading) loading.textContent = msg;
            }
            const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
            const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;

            function toBase64(bytes) {
              let bin = '';
              for (let i = 0; i < bytes.length; i += 0x8000) {

            try {
              const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
              const templateEl = document.querySelector('script[type="__bundler/template"]');
              if (!manifestEl || !templateEl) {
                setStatus('Error: missing bundle data');

              const blobUrls = {};
              const resourceBlobs = {};

                const entry = manifest[uuid];
                try {
                  const binaryStr = atob(entry.data);
                  const bytes = new Uint8Array(binaryStr.length);
                  for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);
                  let finalBytes = bytes;
                  if (entry.compressed) {
                    if (typeof DecompressionStream !== 'undefined') {
                      const ds = new DecompressionStream('gzip');
                      const writer = ds.writable.getWriter();
                      const reader = ds.readable.getReader();
                      writer.write(bytes);
                      writer.close();
                      const chunks = [];
                      let totalLen = 0;
                      while (true) {
                        const {
                          done,
                          value
                        } = await reader.read();
                        if (done) break;
                        chunks.push(value);
                        totalLen += value.length;
                      }
                      finalBytes = new Uint8Array(totalLen);
                      let offset = 0;
                      for (const chunk of chunks) {
                        finalBytes.set(chunk, offset);
                        offset += chunk.length;
                      }
                    } else {
                      console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
                    }
                  }
                  if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
                    // Strict artifact hosts allow font-src data: but not blob:.
                    blobUrls[uuid] = 'data:' + entry.mime + ';base64,' + (entry.compressed ? toBase64(finalBytes) : entry.data);
                  } else {
                    const blob = new Blob([finalBytes], {
                      type: entry.mime
                    });
                    blobUrls[uuid] = URL.createObjectURL(blob);
                    resourceBlobs[blobUrls[uuid]] = blob;
                  }
                } catch (err) {
                  console.error('Failed to decode asset ' + uuid + ':', err);
                  const blob = new Blob([], {
                    type: entry.mime
                  });
                  blobUrls[uuid] = URL.createObjectURL(blob);
                  resourceBlobs[blobUrls[uuid]] = blob;
                }
              }));
              const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
              const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
              const resourceMap = {};
              for (const entry of extResources) {
                if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
              }
              // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
              // consumers read these Blobs directly. Survives the swap like the error sink.
              window.__resourceBlobs = resourceBlobs;
              setStatus('Rendering...');
              for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);
              // Strip integrity + crossorigin — blob URLs from a file:// document inherit
              // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
              // The manifest bytes are ours; SRI protects against CDN compromise, not this.

              const resourceScript = ' < script > window.__resources = ' +
              JSON.stringify(resourceMap).replace(/<\//g, '<\\/') + '; < /' + 'script>';
                // Inject after 
                < head > so the DOCTYPE stays first;
              prepending the script
                // would push the parser into quirks mode. DOMParser always emits a 
                < head >
                // (synthesizing one if the source HTML omitted it) but may carry
                // attributes through, so match the full opening tag. slice() rather than
                // replace() keeps us clear of $-pattern substitution in resourceScript.
                const headOpen = template.match(/ < head[ ^ > ] * > /i);
                  if (headOpen) {
                    const i = headOpen.index + headOpen[0].length;
                    template = template.slice(0, i) + resourceScript + template.slice(i);
                  }
                  // Parse the template and swap the root element. Scripts inserted via
                  // DOMParser/replaceWith are inert per spec — re-create each with
                  // createElement so they execute, awaiting onload for src scripts to
                  // preserve ordering (React before ReactDOM before Babel before text/babel).
                  const doc = new DOMParser().parseFromString(template, 'text/html'); document.documentElement.replaceWith(doc.documentElement);
                  const dead = Array.from(document.scripts);
                  for (const old of dead) {
                    const s = document.createElement('script');
                    for (const a of old.attributes) s.setAttribute(a.name, a.value);
                    s.textContent = old.textContent;
                    // text/babel scripts with a src: read and inline. transformScriptTags
                    // does XHR against the src, but blob:null/ from a file:// origin is
                    // silently dropped. Inlining makes it a plain inline babel script,
                    // which transformScriptTags handles unconditionally.
                    if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
                      const pre = resourceBlobs[s.src.split('#')[0]];
                      s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
                      s.removeAttribute('src');
                    }
                    const p = s.src ? new Promise(function(r) {
                      s.onload = s.onerror = r;
                    }) : null;
                    old.replaceWith(s);
                    if (p) await p;
                  }
                  // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
                  // which fired before we swapped the document. Trigger manually if present.
                  if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
                    window.Babel.transformScriptTags();
                  }
                }
              catch (err) {
                setStatus('Error unpacking: ' + err.message);
                console.error('Bundle unpack error:', err);
              }
            });

    <script type="__bundler/template"> "
							<!DOCTYPE html>\n
							<html>
								<head>\n
									<meta charset=\"utf-8\">\n
										<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n
											<script src=\"6b7b26c2-9b55-4f5b-815b-3996209309bd\"><\u002Fscript>\n\n<\u002Fhead>\n
												<body>\n
													<x-dc>\n
														<helmet data-dc-atomics=\"\">
															<style>:root {\n  /* Base palette */\n  --black: #000000;\n  --white: #ffffff;\n\n  --blue-accent: #0069bf;   /* headings, links, primary brand blue */\n  --blue-focus: #4a90e2;    /* focus rings / accessibility */\n\n  --grey-band: #d9d9d9;     /* section bands / dividers */\n  --grey-100: #f7f7f7;\n  --grey-200: #f5f5f5;\n  --grey-300: #f2f2f2;\n\n  --green-win: #09ce55;\n  --red-loss: #ff0000;\n\n  /* Legacy navy set — seen in older page headers, kept for continuity */\n  --navy-legacy-1: #000080;\n  --navy-legacy-2: #191970;\n  --navy-legacy-3: #003366;\n  --navy-legacy-4: #4169e1;\n\n  /* Shadows */\n  --shadow-button: rgba(0, 0, 0, 0.05);\n  --shadow-overlay: rgba(0, 0, 0, 0.4);\n\n  /* Semantic aliases */\n  --color-fg: var(--black);\n  --color-bg: var(--white);\n  --color-heading: var(--blue-accent);\n  --color-link: var(--blue-accent);\n  --color-link-hover: var(--navy-legacy-3);\n  --color-focus-ring: var(--blue-focus);\n\n  --color-surface: var(--white);\n  --color-surface-band: var(--grey-band);\n  --color-surface-subtle: var(--grey-200);\n\n  --color-border: var(--grey-band);\n\n  --color-win: var(--green-win);\n  --color-loss: var(--red-loss);\n\n  --color-button-bg: var(--black);\n  --color-button-fg: var(--white);\n}\n<\u002Fstyle>
																<style>/* Brand display font: \"Strike Fighter Laser\" (Iconian Fonts) is a licensed,\n   non-free custom font we do not have binaries for — see readme.md\n   TYPOGRAPHY / Font substitution note. Substituted with Google Fonts\n   \"Black Ops One\", the closest free match for its squared, stencil-cut,\n   sport/industrial character. Swap this @font-face for the real family\n   the moment binaries are supplied. */\n@font-face {\n  font-family: 'Strike Fighter Laser';\n  src: local('Black Ops One');\n  font-weight: 400;\n  font-style: normal;\n  font-display: swap;\n}\n\n/* Real brand fonts, loaded from Google Fonts in styles.css import list */\n<\u002Fstyle>
																	<style>:root {\n  --font-display: 'Black Ops One', 'Strike Fighter Laser', Helvetica, Arial, sans-serif;\n  --font-mono: 'IBM Plex Mono', 'Courier New', monospace;\n  --font-ui: 'Inter', Helvetica, Arial, sans-serif;\n\n  --fw-regular: 400; /* @kind other */\n  --fw-medium: 500; /* @kind other */\n  --fw-bold: 700; /* @kind other */\n\n  /* Display / hero (Strike Fighter Laser stand-in) */\n  --text-hero: 96px;\n  --text-h1: 64px;\n  --text-h2: 40px;\n  --text-h3: 40px; /* section-band title size */\n\n  /* Scores */\n  --text-score: 48px;\n\n  /* Stats / numbers (IBM Plex Mono) */\n  --text-stat: 32px;\n\n  /* UI / body (Inter) */\n  --text-ui-xs: 12px;\n  --text-ui-sm: 14px;\n  --text-ui-base: 16px;\n  --text-ui-lg: 18px;\n  --text-ui-xl: 24px;\n\n  --line-tight: 1.05; /* @kind other */\n  --line-normal: 1.4; /* @kind other */\n  --line-loose: 1.6; /* @kind other */\n}\n\nh1, h2, h3, .font-display {\n  font-family: var(--font-display);\n  font-weight: var(--fw-regular);\n  color: var(--color-heading);\n  line-height: var(--line-tight);\n  letter-spacing: 0.01em;\n}\n\n.font-mono, .stat-number {\n  font-family: var(--font-mono);\n  color: var(--blue-accent);\n}\n\nbody, p, .font-ui {\n  font-family: var(--font-ui);\n}\n<\u002Fstyle>
																		<style>:root {\n  --space-xs: 8px;\n  --space-s: 24px;\n  --space-m: 48px;\n\n  /* Extra scale, derived, used for finer UI density beyond the 3 Figma tokens */\n  --space-2xs: 4px;\n  --space-l: 64px;\n  --space-xl: 96px;\n\n  --layout-max-width: 1440px;\n  --section-band-height: 83px;\n}\n<\u002Fstyle>

on bands / dividers */\n  --grey-100: #f7f7f7;\n  --grey-200: #f5f5f5;\n  --grey-300: #f2f2f2;\n\n  --green-win: #09ce55;\n  --red-loss: #ff0000;\n\n  /* Legacy navy set — seen in older page headers, kept for continuity */\n  --navy-legacy-1: #000080;\n  --navy-legacy-2: #191970;\n  --navy-legacy-3: #003366;\n  --navy-legacy-4: #4169e1;\n\n  /* Shadows */\n  --shadow-button: rgba(0, 0, 0, 0.05);\n  --shadow-overlay: rgba(0, 0, 0, 0.4);\n\n  /* Semantic aliases */\n  --color-fg: var(--black);\n  --color-bg: var(--white);\n  --color-heading: var(--blue-accent);\n  --color-link: var(--blue-accent);\n  --color-link-hover: var(--navy-legacy-3);\n  --color-focus-ring: var(--blue-focus);\n\n  --color-surface: var(--white);\n  --color-surface-band: var(--grey-band);\n  --color-surface-subtle: var(--grey-200);\n\n  --color-border: var(--grey-band);\n\n  --color-win: var(--green-win);\n  --color-loss: var(--red-loss);\n\n  --color-button-bg: var(--black);\n  --color-button-fg: var(--white);\n}\n\n/* Brand display font: \"Strike Fighter Laser\" (Iconian Fonts) is a licensed,\n   non-free custom font we do not have binaries for — see readme.md\n   TYPOGRAPHY / Font substitution note. Substituted with Google Fonts\n   \"Black Ops One\", the closest free match for its squared, stencil-cut,\n   sport/industrial character. Swap this @font-face for the real family\n   the moment binaries are supplied. */\n@font-face {\n  font-family: 'Strike Fighter Laser';\n  src: local('Black Ops One');\n  font-weight: 400;\n  font-style: normal;\n  font-display: swap;\n}\n\n/* Real brand fonts, loaded from Google Fonts in styles.css import list */\n\n:root {\n  --font-display: 'Black Ops One', 'Strike Fighter Laser', Helvetica, Arial, sans-serif;\n  --font-mono: 'IBM Plex Mono', 'Courier New', monospace;\n  --font-ui: 'Inter', Helvetica, Arial, sans-serif;\n\n  --fw-regular: 400; /* @kind other */\n  --fw-medium: 500; /* @kind other */\n  --fw-bold: 700; /* @kind other */\n\n  /* Display / hero ( 																																																					<p>Milano chiude il quarto periodo con un parziale di 14-3 e ribalta una gara che, fino agli ultimi cinque minuti, sembrava in mano a Reggio Emilia. Decisivo il contributo dalla panchina, con la squadra di casa che ha trovato canestri pesanti proprio quando l'inerzia sembrava girata dall'altra parte.<\u002Fp>
																																																						<h3>Un avvio in salita<\u002Fh3>
																																																							<p>Reggio Emilia parte forte e costruisce un vantaggio in doppia cifra già nel secondo quarto, sfruttando un buon possesso a rimbalzo offensivo e percentuali alte dall'arco. Milano fatica a trovare ritmo offensivo e va all'intervallo sotto di 11 punti.<\u002Fp>
																																																								<p>Nella ripresa cambia l'approccio difensivo: pressione a tutto campo e maggiore aggressività sulle linee di passaggio permettono di recuperare possessi importanti e ridurre il divario prima dell'ultimo quarto.<\u002Fp>
																																																									<div class=\"quote\">\"Nel finale abbiamo difeso da squadra vera. Quando giochiamo così, siamo difficili da affrontare per chiunque.\" — dalle dichiarazioni post-partita<\u002Fdiv>
																																																										<h3>Il finale di gara<\u002Fh3>
																																																											<p>Negli ultimi minuti Milano piazza il parziale decisivo, chiudendo i possessi difensivi con rimbalzi puliti e trovando conclusioni ad alta percentuale in transizione. La vittoria porta la squadra a quota 18 successi in campionato.<\u002Fp>
