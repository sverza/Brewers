<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Basketball Shot Chart Analytics</title>

  <!-- D3.js -->
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-dark: #020817;
      --bg-mid: #071633;
      --bg-light: #10204d;

      --court-line: rgba(255,255,255,0.9);
      --made: #22c55e;
      --missed: #ff4d5a;
      --rim: #ff7a18;

      --text-main: #ffffff;
      --text-secondary: rgba(255,255,255,0.7);
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, #10204d 0%, transparent 30%),
        radial-gradient(circle at bottom right, #071633 0%, transparent 35%),
        linear-gradient(135deg, var(--bg-dark), var(--bg-mid));
      font-family: Inter, system-ui, sans-serif;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
    }

    .dashboard {
      width: 100%;
      max-width: 1000px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .title {
      font-size: clamp(2.2rem, 6vw, 4rem);
      font-weight: 900;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-align: center;
      line-height: 1;
    }

    .subtitle {
      font-size: clamp(0.95rem, 2vw, 1.1rem);
      color: var(--text-secondary);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 12px;
    }

    .court-wrapper {
      width: 100%;
      max-width: 720px;
      aspect-ratio: 500 / 470;
      position: relative;
      border-radius: 28px;
      overflow: hidden;

      background: rgba(255,255,255,0.03);

      backdrop-filter: blur(12px);

      border: 1px solid rgba(255,255,255,0.08);

      box-shadow:
        0 20px 60px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.05);
    }

    svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .court-line {
      fill: none;
      stroke: var(--court-line);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0.9;
    }

    .shot {
      cursor: pointer;
      transition:
        transform 0.2s ease,
        opacity 0.2s ease;
    }

    .tooltip {
      position: fixed;
      pointer-events: none;
      opacity: 0;

      background: rgba(10, 15, 30, 0.75);
      backdrop-filter: blur(16px);

      border: 1px solid rgba(255,255,255,0.08);

      border-radius: 16px;

      padding: 14px 16px;

      color: white;

      min-width: 180px;

      box-shadow:
        0 10px 40px rgba(0,0,0,0.45);

      transition:
        opacity 0.2s ease,
        transform 0.2s ease;

      transform: translateY(10px);

      z-index: 999;
    }

    .tooltip.active {
      opacity: 1;
      transform: translateY(0);
    }

    .tooltip h4 {
      font-size: 0.95rem;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .tooltip p {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.82);
      margin-bottom: 4px;
    }

    .legend {
      display: flex;
      gap: 18px;
      margin-top: 6px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,0.8);
      font-size: 0.85rem;
      letter-spacing: 0.03em;
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .made-dot {
      background: var(--made);
    }

    .missed-dot {
      background: var(--missed);
    }

    @media (max-width: 640px) {
      body {
        padding: 16px;
      }

      .court-wrapper {
        border-radius: 20px;
      }
    }
  </style>
</head>
<body>

  <div class="dashboard">

    <h1 class="title">SHOT CHART</h1>

    <p class="subtitle">
      Brewers Basketball Analytics
    </p>

    <div class="court-wrapper">
      <svg id="court" viewBox="0 0 500 470" preserveAspectRatio="xMidYMid meet"></svg>
    </div>

    <div class="legend">
      <div class="legend-item">
        <div class="legend-dot made-dot"></div>
        Made Shot
      </div>

      <div class="legend-item">
        <div class="legend-dot missed-dot"></div>
        Missed Shot
      </div>
    </div>

  </div>

  <div class="tooltip" id="tooltip"></div>


  
<div x-data="{ activeTab:  0 }">
  <div class="border-b border-b-gray-100">
    <ul class="-mb-px flex items-center gap-4 text-sm font-medium">
      <li>
        <a @click="activeTab = 0" :class="{ 'relative text-primary-700  after:absolute after:left-0 after:bottom-0 after:h-0.5 after:w-full after:bg-primary-700': activeTab === 0 }" class="inline-flex cursor-pointer items-center gap-2 px-1 py-3 text-gray-500 hover:text-primary-700">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="h-5 w-5">
            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-5.5-2.5a2.5 2.5 0 11-5 0 2.5 2.5 0 015 0zM10 12a5.99 5.99 0 00-4.793 2.39A6.483 6.483 0 0010 16.5a6.483 6.483 0 004.793-2.11A5.99 5.99 0 0010 12z" clip-rule="evenodd" />
          </svg>
          Profile</a
        >
      </li>
      <li>
        <a @click="activeTab = 1" :class="{ 'relative text-primary-700  after:absolute after:left-0 after:bottom-0 after:h-0.5 after:w-full after:bg-primary-700': activeTab === 1 }" class="inline-flex cursor-pointer items-center gap-2 px-1 py-3 text-gray-500 hover:text-primary-700">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="h-5 w-5">
            <path fill-rule="evenodd" d="M3.5 2A1.5 1.5 0 002 3.5V15a3 3 0 106 0V3.5A1.5 1.5 0 006.5 2h-3zm11.753 6.99L9.5 14.743V6.257l1.51-1.51a1.5 1.5 0 012.122 0l2.121 2.121a1.5 1.5 0 010 2.122zM8.364 18H16.5a1.5 1.5 0 001.5-1.5v-3a1.5 1.5 0 00-1.5-1.5h-2.136l-6 6zM5 16a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd" />
          </svg>

          Preferences</a
        >
      </li>
      <li>
        <a @click="activeTab = 2" :class="{ 'relative text-primary-700  after:absolute after:left-0 after:bottom-0 after:h-0.5 after:w-full after:bg-primary-700': activeTab === 2 }" class="inline-flex cursor-pointer items-center gap-2 px-1 py-3 text-gray-500 hover:text-primary-700">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="h-5 w-5">
            <path fill-rule="evenodd" d="M10 2a6 6 0 00-6 6c0 1.887-.454 3.665-1.257 5.234a.75.75 0 00.515 1.076 32.91 32.91 0 003.256.508 3.5 3.5 0 006.972 0 32.903 32.903 0 003.256-.508.75.75 0 00.515-1.076A11.448 11.448 0 0116 8a6 6 0 00-6-6zM8.05 14.943a33.54 33.54 0 003.9 0 2 2 0 01-3.9 0z" clip-rule="evenodd" />
          </svg>
          Notifications
          <span class="rounded-full bg-gray-100 px-2 py-0.5 text-xs font-semibold text-gray-500"> 8 </span></a
        >
      </li>
      <li>
        <a @click="activeTab = 3" :class="{ 'relative text-primary-700  after:absolute after:left-0 after:bottom-0 after:h-0.5 after:w-full after:bg-primary-700': activeTab === 3 }" class="inline-flex cursor-pointer items-center gap-2 px-1 py-3 text-gray-500 hover:text-primary-700">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="h-5 w-5">
            <path fill-rule="evenodd" d="M4.25 2A2.25 2.25 0 002 4.25v2.5A2.25 2.25 0 004.25 9h2.5A2.25 2.25 0 009 6.75v-2.5A2.25 2.25 0 006.75 2h-2.5zm0 9A2.25 2.25 0 002 13.25v2.5A2.25 2.25 0 004.25 18h2.5A2.25 2.25 0 009 15.75v-2.5A2.25 2.25 0 006.75 11h-2.5zm9-9A2.25 2.25 0 0011 4.25v2.5A2.25 2.25 0 0013.25 9h2.5A2.25 2.25 0 0018 6.75v-2.5A2.25 2.25 0 0015.75 2h-2.5zm0 9A2.25 2.25 0 0011 13.25v2.5A2.25 2.25 0 0013.25 18h2.5A2.25 2.25 0 0018 15.75v-2.5A2.25 2.25 0 0015.75 11h-2.5z" clip-rule="evenodd" />
          </svg>
          Applications</a
        >
      </li>
      <li>
        <a @click="activeTab = 4" :class="{ 'relative text-primary-700  after:absolute after:left-0 after:bottom-0 after:h-0.5 after:w-full after:bg-primary-700': activeTab === 4 }" class="inline-flex cursor-pointer items-center gap-2 px-1 py-3 text-gray-500 hover:text-primary-700">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="h-5 w-5">
            <path fill-rule="evenodd" d="M10.362 1.093a.75.75 0 00-.724 0L2.523 5.018 10 9.143l7.477-4.125-7.115-3.925zM18 6.443l-7.25 4v8.25l6.862-3.786A.75.75 0 0018 14.25V6.443zm-8.75 12.25v-8.25l-7.25-4v7.807a.75.75 0 00.388.657l6.862 3.786z" clip-rule="evenodd" />
          </svg>

          API</a
        >
      </li>
    </ul>
  </div>
  <div class="py-3">
    <div :class="{ '!block': activeTab === 0 }" x-show.transition.in.opacity.duration.600="activeTab === 0" class="hidden">Tab content 1</div>
    <div :class="{ '!block': activeTab === 1 }" x-show.transition.in.opacity.duration.600="activeTab === 1" class="hidden">Tab content 2</div>
    <div :class="{ '!block': activeTab === 2 }" x-show.transition.in.opacity.duration.600="activeTab === 2" class="hidden">Tab content 3</div>
    <div :class="{ '!block': activeTab === 3 }" x-show.transition.in.opacity.duration.600="activeTab === 3" class="hidden">Tab content 4</div>
    <div :class="{ '!block': activeTab === 4 }" x-show.transition.in.opacity.duration.600="activeTab === 4" class="hidden">Tab content 5</div>
  </div>
</div>


  <script>

    // =========================================
    // SVG SETUP
    // =========================================

    const width = 500;
    const height = 470;

    const svg = d3
      .select("#court");

    // =========================================
    // COURT DRAWING
    // =========================================

    const court = svg.append("g");

    // Main outer boundary
    court.append("rect")
      .attr("x", 30)
      .attr("y", 20)
      .attr("width", 440)
      .attr("height", 430)
      .attr("rx", 2)
      .attr("class", "court-line");

    // Paint area
    court.append("rect")
      .attr("x", 170)
      .attr("y", 20)
      .attr("width", 160)
      .attr("height", 190)
      .attr("class", "court-line");

    // Free throw circle (top half)
    court.append("path")
      .attr(
        "d",
        d3.arc()({
          innerRadius: 0,
          outerRadius: 60,
          startAngle: Math.PI + Math.PI/2,
          endAngle: 0 + Math.PI/2
        })
      )
      .attr("transform", "translate(250,210)")
      .attr("class", "court-line");

    // Free throw line
    court.append("line")
      .attr("x1", 170)
      .attr("y1", 210)
      .attr("x2", 330)
      .attr("y2", 210)
      .attr("class", "court-line");

    // Backboard
    court.append("line")
      .attr("x1", 220)
      .attr("y1", 60)
      .attr("x2", 280)
      .attr("y2", 60)
      .attr("class", "court-line");

    // Rim
    court.append("circle")
      .attr("cx", 250)
      .attr("cy", 80)
      .attr("r", 10)
      .attr("fill", "none")
      .attr("stroke", "#ff7a18")
      .attr("stroke-width", 3);

    // Restricted Area
    court.append("path")
      .attr(
        "d",
        d3.arc()({
          innerRadius: 0,
          outerRadius: 40,
          startAngle: Math.PI,
          endAngle: 0
        })
      )
      .attr("transform", "translate(250,80)")
      .attr("class", "court-line");

    // Three-point side lines
    court.append("line")
      .attr("x1", 90)
      .attr("y1", 20)
      .attr("x2", 90)
      .attr("y2", 140)
      .attr("class", "court-line");

    court.append("line")
      .attr("x1", 410)
      .attr("y1", 20)
      .attr("x2", 410)
      .attr("y2", 140)
      .attr("class", "court-line");

    // Three-point arc - complete arc from left baseline to right baseline
    const threePointArc = d3.path();
    
    // Start from left baseline
    threePointArc.moveTo(90, 140);
    
    // Draw arc using SVG quadratic curve
    // The arc goes from left side (90, 140) to right side (410, 140)
    // Control point at top center to create the arc
    threePointArc.quadraticCurveTo(250, -100, 410, 140);
    
    court.append("path")
      .attr("d", threePointArc.toString())
      .attr("class", "court-line");

    // Connecting lines from three-point arc to sidelines (baseline)
    court.append("line")
      .attr("x1", 90)
      .attr("y1", 140)
      .attr("x2", 90)
      .attr("y2", 450)
      .attr("class", "court-line");

    court.append("line")
      .attr("x1", 410)
      .attr("y1", 140)
      .attr("x2", 410)
      .attr("y2", 450)
      .attr("class", "court-line");

    // Hoop center mark
    court.append("circle")
      .attr("cx", 250)
      .attr("cy", 80)
      .attr("r", 2)
      .attr("fill", "#ff7a18");

    // =========================================
    // SHOT DATA
    // =========================================

    const shots = [
      {
        x: 250,
        y: 130,
        made: true,
        player: "Marcus Hill",
        zone: "Restricted Area"
      },
      {
        x: 190,
        y: 170,
        made: false,
        player: "Luca Bryant",
        zone: "Left Elbow"
      },
      {
        x: 310,
        y: 180,
        made: true,
        player: "Jordan Wells",
        zone: "Right Elbow"
      },
      {
        x: 120,
        y: 240,
        made: false,
        player: "Chris Moore",
        zone: "Left Wing 3"
      },
      {
        x: 380,
        y: 230,
        made: true,
        player: "Derek Stone",
        zone: "Right Wing 3"
      },
      {
        x: 250,
        y: 310,
        made: true,
        player: "Marcus Hill",
        zone: "Top Key 3"
      },
      {
        x: 150,
        y: 110,
        made: false,
        player: "Luca Bryant",
        zone: "Baseline Floater"
      }
    ];

    // =========================================
    // TOOLTIP
    // =========================================

    const tooltip = d3.select("#tooltip");

    // =========================================
    // SHOT RENDERING
    // =========================================

    const shotGroup = svg.append("g");

    const shotElements = shotGroup
      .selectAll("circle")
      .data(shots)
      .enter()
      .append("circle")

      .attr("class", "shot")

      .attr("cx", d => d.x)
      .attr("cy", d => d.y)

      .attr("r", 0)

      .attr("fill", d =>
        d.made ? "#22c55e" : "#ff4d5a"
      )

      .attr("stroke", "rgba(255,255,255,0.15)")
      .attr("stroke-width", 1.5)

      .attr("opacity", 0);

    // Fade-in animation
    shotElements
      .transition()
      .delay((d, i) => i * 120)
      .duration(600)
      .ease(d3.easeCubicOut)
      .attr("r", 9)
      .attr("opacity", 1);

    // =========================================
    // TOOLTIP EVENTS
    // =========================================

    shotElements

      .on("mouseenter touchstart", function(event, d) {

        d3.select(this)
          .transition()
          .duration(180)
          .attr("r", 13)
          .attr("stroke", "#ffffff")
          .attr("stroke-width", 3);

        tooltip
          .html(`
            <h4>${d.player}</h4>
            <p><strong>Result:</strong> ${d.made ? "Made Shot" : "Missed Shot"}</p>
            <p><strong>Zone:</strong> ${d.zone}</p>
          `)
          .classed("active", true);

      })

      .on("mousemove touchmove", function(event) {

        let x = event.clientX + 16;
        let y = event.clientY - 20;

        tooltip
          .style("left", `${x}px`)
          .style("top", `${y}px`);

      })

      .on("mouseleave touchend", function() {

        d3.select(this)
          .transition()
          .duration(180)
          .attr("r", 9)
          .attr("stroke", "rgba(255,255,255,0.15)")
          .attr("stroke-width", 1.5);

        tooltip
          .classed("active", false);

      });

  </script>

</body>
</html>
