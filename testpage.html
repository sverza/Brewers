<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Basket Shot Chart</title>

<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
    body{
        margin:0;
        background:#0f172a;
        font-family:Arial, sans-serif;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        overflow:hidden;
    }

    #chart{
        width:100%;
        max-width:500px;
        margin: auto;
        aspect-ratio:1/1;
    }

    svg{
        width:100%;
        height:100%;
    }

    .court-line{
        stroke:white;
        stroke-width:2;
        fill:none;
    }

    .shot{
        transition:0.2s;
        cursor:pointer;
    }

    .shot:hover{
        r:10;
        stroke:white;
        stroke-width:2;
    }

    .tooltip{
        position:absolute;
        background:#1e293b;
        color:white;
        padding:10px 14px;
        border-radius:10px;
        pointer-events:none;
        font-size:14px;
        opacity:0;
        transition:0.2s;
        border:1px solid rgba(255,255,255,.15);
    }
</style>
</head>
<body>

<div id="chart">
    <div class="tooltip" id="tooltip"></div>
</div>

<script>

const width = 500;
const height = 470;

const svg = d3.select("#chart")
    .append("svg")
    .attr("viewBox", `0 0 ${width} ${height}`);

const tooltip = document.getElementById("tooltip");

//
// HALF COURT
//

// outer lines
svg.append("rect")
    .attr("x",0)
    .attr("y",0)
    .attr("width",470)
    .attr("height",500)
    .attr("class","court-line");

// paint
svg.append("rect")
    .attr("x",0)
    .attr("y",190)
    .attr("width",190)
    .attr("height",120)
    .attr("class","court-line");

// free throw circle
svg.append("circle")
    .attr("cx",190)
    .attr("cy",250)
    .attr("r",60)
    .attr("class","court-line");

// basket
svg.append("circle")
    .attr("cx",60)
    .attr("cy",250)
    .attr("r",7)
    .attr("stroke","orange")
    .attr("stroke-width",3)
    .attr("fill","none");

// backboard
svg.append("line")
    .attr("x1",40)
    .attr("y1",220)
    .attr("x2",40)
    .attr("y2",280)
    .attr("stroke","white")
    .attr("stroke-width",4);

// restricted area
svg.append("path")
    .attr("d", d3.arc()({
        innerRadius:40,
        outerRadius:40,
        startAngle:-Math.PI/2,
        endAngle:Math.PI/2
    }))
    .attr("transform","translate(60,250)")
    .attr("class","court-line");

// three point corners
svg.append("line")
    .attr("x1",0)
    .attr("y1",30)
    .attr("x2",140)
    .attr("y2",30)
    .attr("class","court-line");

svg.append("line")
    .attr("x1",0)
    .attr("y1",470)
    .attr("x2",140)
    .attr("y2",470)
    .attr("class","court-line");

// three point arc
svg.append("path")
    .attr("d", d3.arc()({
        innerRadius:237,
        outerRadius:237,
        startAngle:-1.12,
        endAngle:1.12
    }))
    .attr("transform","translate(60,250)")
    .attr("class","court-line");

//
// SHOT DATA
//

const shots = [
    {x:120, y:250, made:true, player:"Curry"},
    {x:250, y:120, made:false, player:"Curry"},
    {x:320, y:350, made:true, player:"Thompson"},
    {x:150, y:400, made:false, player:"Green"},
    {x:220, y:250, made:true, player:"Curry"},
    {x:380, y:250, made:false, player:"Wiggins"},
    {x:270, y:180, made:true, player:"Curry"},
    {x:300, y:420, made:false, player:"Thompson"}
];

//
// DRAW SHOTS
//

svg.selectAll(".shot")
    .data(shots)
    .enter()
    .append("circle")
    .attr("class","shot")
    .attr("cx",d=>d.x)
    .attr("cy",d=>d.y)
    .attr("r",7)
    .attr("fill",d=>d.made ? "#22c55e" : "#ef4444")
    .attr("opacity",0)
    .transition()
    .duration(500)
    .delay((d,i)=>i*100)
    .attr("opacity",1);

//
// TOOLTIP
//

svg.selectAll(".shot")
    .on("mousemove",(event,d)=>{

        tooltip.style.opacity = 1;

        tooltip.innerHTML = `
            <strong>${d.player}</strong><br>
            ${d.made ? "Canestro" : "Errore"}
        `;

        tooltip.style.left = (event.pageX + 15) + "px";
        tooltip.style.top = (event.pageY - 20) + "px";

    })
    .on("mouseleave",()=>{
        tooltip.style.opacity = 0;
    });

</script>

</body>
</html>
