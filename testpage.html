<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basket Shot Chart</title>

<style>
    body{
        margin:0;
        background:#111;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        font-family:Arial;
    }

    canvas{
        background:#d88c4a;
        border:4px solid white;
        border-radius:12px;
    }
</style>
</head>
<body>

<canvas id="court" width="700" height="500"></canvas>

<script>

const shots = [
{stat:"ThreePointFG",x:11.21,y:25.71},
{stat:"ThreePointFGMiss",x:22.81,y:28.68},
{stat:"ThreePointFGMiss",x:5.84,y:20.43},
{stat:"ThreePointFG",x:38.28,y:25.06},
{stat:"ThreePointFGMiss",x:38.99,y:23.89},
{stat:"ThreePointFG",x:26.43,y:29.2},
{stat:"ThreePointFG",x:8,y:21.45},
{stat:"ThreePointFG",x:24.14,y:29.97},
{stat:"ThreePointFG",x:15.31,y:27.53},
{stat:"ThreePointFG",x:42.26,y:21.92},
{stat:"ThreePointFG",x:42.66,y:21.51},
{stat:"ThreePointFG",x:45.1,y:17.22},
{stat:"ThreePointFG",x:43.43,y:20.4},
];

const canvas = document.getElementById("court");
const ctx = canvas.getContext("2d");

const W = canvas.width;
const H = canvas.height;

// SCALE
const scaleX = W / 50;
const scaleY = H / 35;

// DRAW COURT
function drawCourt(){

    // background
    ctx.fillStyle = "#d88c4a";
    ctx.fillRect(0,0,W,H);

    ctx.strokeStyle = "white";
    ctx.lineWidth = 3;

    // outer lines
    ctx.strokeRect(20,20,W-40,H-40);

    // basket
    const hoopX = W/2;
    const hoopY = 60;

    ctx.beginPath();
    ctx.arc(hoopX, hoopY, 8, 0, Math.PI*2);
    ctx.stroke();

    // backboard
    ctx.beginPath();
    ctx.moveTo(hoopX-30,40);
    ctx.lineTo(hoopX+30,40);
    ctx.stroke();

    // paint area
    ctx.strokeRect(W/2-80,20,160,190);

    // free throw circle
    ctx.beginPath();
    ctx.arc(W/2,210,60,0,Math.PI);
    ctx.stroke();

    // three point arc
    ctx.beginPath();
    ctx.arc(W/2,60,230,0.22*Math.PI,0.78*Math.PI,false);
    ctx.stroke();

    // corner 3 lines
    ctx.beginPath();
    ctx.moveTo(70,20);
    ctx.lineTo(70,180);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(W-70,20);
    ctx.lineTo(W-70,180);
    ctx.stroke();
}

// DRAW SHOTS
function drawShots(){

    shots.forEach(s => {

        // convert coordinates
        const px = s.x * scaleX;
        const py = H - (s.y * scaleY);

        if(s.stat === "ThreePointFG"){

            ctx.fillStyle = "#00ff66";

            ctx.beginPath();
            ctx.arc(px,py,7,0,Math.PI*2);
            ctx.fill();

        }else{

            ctx.strokeStyle = "#ff3333";
            ctx.lineWidth = 3;

            ctx.beginPath();
            ctx.moveTo(px-6,py-6);
            ctx.lineTo(px+6,py+6);

            ctx.moveTo(px+6,py-6);
            ctx.lineTo(px-6,py+6);
            ctx.stroke();
        }

    });

}

drawCourt();
drawShots();

</script>

</body>
</html>
